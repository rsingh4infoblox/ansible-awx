---
# AWX Custom Credential Type – Infoblox NIOS
#
# Import via AWX UI:
#   Administration > Credential Types > Add
#   Paste the "inputs" block into "Input Configuration"
#   Paste the "injectors" block into "Injector Configuration"
#
# Or import with awx-cli / ansible.controller collection:
#   awx credential_types create --name "Infoblox NIOS" \
#     --kind cloud \
#     --inputs @awx/credential_type.yml \
#     --injectors @awx/credential_type.yml

name: "Infoblox NIOS"
description: "Infoblox NIOS Grid Manager credentials"
kind: cloud

inputs:
  fields:
    - id: nios_host
      type: string
      label: "NIOS Host"
      help_text: "Infoblox Grid Manager hostname or IP address"

    - id: nios_username
      type: string
      label: "Username"

    - id: nios_password
      type: string
      label: "Password"
      secret: true

    - id: nios_wapi_version
      type: string
      label: "WAPI Version"
      default: "2.1"
      help_text: "Infoblox WAPI version (e.g. 2.1, 2.5, 2.9)"

    - id: nios_ssl_verify
      type: boolean
      label: "SSL Verify"
      default: false

  required:
    - nios_host
    - nios_username
    - nios_password

injectors:
  extra_vars:
    nios_host: "{{ nios_host }}"
    nios_username: "{{ nios_username }}"
    nios_password: "{{ nios_password }}"
    nios_wapi_version: "{{ nios_wapi_version }}"
    nios_ssl_verify: "{{ nios_ssl_verify }}"
